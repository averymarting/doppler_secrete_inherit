name: Deploy Workflow
on: [push]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. This securely downloads your JSON secret straight from Doppler
      - name: Fetch Secrets from Doppler
        uses: dopplerhq/secrets-fetch-action@v2.1.0
        with:
          doppler-token: ${{ secrets.DOPPLER_TOKEN }}
          inject-env-vars: true

      # 2. This writes your variable into the physical file
      - name: Create Google Credentials File
        run: |
          cat << 'EOF' > google-credentials.json
          $GOOGLE_OAUTH_CREDENTIALS
          EOF

      # 3. This verifies that your JSON format is intact and populated
      - name: Verify JSON File Structure
        run: |
          if [ -s google-credentials.json ]; then
            echo "google-credentials.json successfully created!"
            # Prints just the JSON keys to prove it worked without showing tokens
            jq 'keys' google-credentials.json
          else
            echo "Error: Credentials file is empty."
            exit 1
          fi
