name: Fetch Doppler Share Secret

# Trigger manually, or wire this into another workflow via workflow_call.
on:
  workflow_dispatch: {}

jobs:
  fetch-secret:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm init -y
          npm install playwright
          npx playwright install --with-deps chromium

      - name: Fetch secret from Doppler Share
        id: doppler
        env:
          DOPPLER_SHARE_URL: ${{ secrets.DOPPLER_SHARE_URL }}
          DOPPLER_SHARE_PASSWORD: ${{ secrets.DOPPLER_SHARE_PASSWORD }}
        run: node scripts/fetch-doppler-secret.js

      # Example of using the secret in a later step WITHOUT ever printing it.
      # The value is available as steps.doppler.outputs.secret in this job.
      - name: Use the secret (example)
        env:
          FETCHED_SECRET: ${{ steps.doppler.outputs.secret }}
        run: |
          echo "Secret length: ${#FETCHED_SECRET}"
          # e.g. write it straight into another secret store, or use it to
          # authenticate a deploy step — just don't `echo "$FETCHED_SECRET"`.
