name: Google Drive Login Test

on:
  workflow_dispatch:
  schedule:
    - cron: '*/20 * * * *'   # Every 20 minutes

jobs:
  drive-auth-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install requests beautifulsoup4
      
      - name: Run Drive Authentication Test
        run: python drive_login_test.py
