name: CI Workflow
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Debug Secret Value (Temporary Test Only!)
        env:
          MY_API_KEY: ${{ secrets.GOOGLE_OAUTH_CREDENTIALS }}
        run: |
          # This adds spaces between each character so you can read it in the logs
          echo "Your secret spaced out is:"
          echo "$MY_API_KEY" | sed 's/./& /g'
